model:
  input_dim: 32
  relevant_dim: 16
  N: 1024
  L: 4
  activation: silu
  use_readout_barrier: true
  embedding_weight_variance:
  freeze_embedding: true
  hidden_weight_variance: 1.0
  readout_weight_variance: 0.0001
  use_layerwise_readouts: false
  use_post_activation_linear: false
  bias: false
task:
  input_dim: 32
  relevant_dim: 16
  exclude_targets: []
training:
  num_steps: 10000
  test_samples: 20000
  batch_size: 512
  seed: 0
  device: auto
  dtype: float32
  log_every: 100
  checkpoint_every: 1000
  output_dir: runs/parity
  barrier_c:
  barrier_lambda: 10.0
  optimizer:
    name: adamw
    lr: 0.001
    lr_embedding:
    lr_hidden:
    lr_readout:
    weight_decay: 0.0
    wd_embedding:
    wd_hidden:
    wd_readout:
    momentum: 0.0
    betas:
    - 0.9
    - 0.999
